<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f1e8" />
    <title>German Flashcards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="kicker">Deutsch Trainer</p>
          <h1>Flashcards</h1>
        </div>
        <button id="shuffleBtn" class="ghost-btn" aria-label="Shuffle cards">Shuffle</button>
      </header>

      <main class="stage" aria-live="polite">
        <p class="progress" id="progressText">1 / 1</p>

        <section class="card-stack" id="cardStack">
          <article class="card" id="flashcard" role="button" tabindex="0" aria-label="Flashcard, tap to flip">
            <div class="card-face card-front">
              <p class="face-label">German</p>
              <h2 id="frontText">Wort</h2>
            </div>
            <div class="card-face card-back" aria-hidden="true">
              <p class="face-label">English</p>
              <h3 id="backText">Word</h3>
              <p class="example" id="exampleText"></p>
            </div>
          </article>
        </section>

        <p class="hint">Swipe up = Learned, swipe down = Again. Tap card to flip.</p>
      </main>

      <footer class="controls">
        <button id="againBtn" class="action-btn negative" aria-label="Mark as again">Again</button>
        <button id="flipBtn" class="action-btn neutral" aria-label="Flip card">Flip</button>
        <button id="learnedBtn" class="action-btn positive" aria-label="Mark as learned">Learned</button>
      </footer>
    </div>

    <script src="vocab.js"></script>
    <script src="app.js"></script>
  </body>
</html>
